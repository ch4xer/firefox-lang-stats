<html>
  <head>
    <title>Language details of the Firefox repo</title>
    <meta name="description" content="How much Rust in Firefox?" />
    <meta name="date" content="2026-05-10T23:08:55+00:00" />
    <meta property="og:title" content="Language details of the Firefox repo" />
    <meta property="og:description" content="How much Rust in Firefox?" />
    <meta property="og:url" content="https://ch4xer.github.io/firefox-lang-stats/" />
    <meta property="og:image" content="rustacean-orig-noshadow.png" />
    <link rel="shortcut icon" href="rustacean-orig-noshadow.ico" type="image/x-icon" />
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
      google.charts.load('current', {'packages':['corechart']});
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {

        var data = google.visualization.arrayToDataTable([
          ['Language', 'LOC']
        , ['Rust', 5727015]
        , ['C', 5504524]
        , ['C++', 10782437]
        , ['JavaScript', 13760859]
        , ['HTML', 6631330]
        , ['Python', 2123217]
        , ['Java', 146081]
        , ['Assembly', 296354]
        ]);

        var options = {
          title: 'Firefox languages in SLOC'
        };

        var chart = new google.visualization.PieChart(document.getElementById('piechart'));

        chart.draw(data, options);
      }
    </script>
  </head>
  <body>
    <a href="https://github.com/ch4xer/firefox-lang-stats"><img style="position: absolute; top: 0; left: 0; border: 0; z-index:100;" src="https://s3.amazonaws.com/github/ribbons/forkme_left_darkblue_121621.png" alt="Fork me on GitHub"></a>
    <div style="margin-left: 150px">
      <h2>How much Rust in Firefox?</h2>
      <p><a href="https://github.com/mozilla-firefox/firefox">mozilla-firefox/firefox</a> repository statistics on May 2026</p>
    </div>
    <div id="piechart" style="width: 900px; height: 500px;"></div>
  </body>
</html>
